<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>After Sunset in Chengdu · 3D Map</title>
  <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet" />
  <script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --gold: #c8a96e; --dark: rgba(6,6,18,0.94); --ktv: #e040fb; --dance: #00e5ff; }
    body { background: #06060e; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; width: 100vw; color: #fff; }
    #map { position: absolute; inset: 0; }

    /* ── Loader ── */
    #loader {
      position: fixed; inset: 0; z-index: 200;
      background: #06060e;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.9s ease;
    }
    #loader.fade-out { opacity: 0; pointer-events: none; }
    .ld-lantern { font-size: 52px; margin-bottom: 22px; animation: swing 2.4s ease-in-out infinite; transform-origin: top center; }
    @keyframes swing { 0%,100%{transform:rotate(-10deg)} 50%{transform:rotate(10deg)} }
    .ld-title { font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase; color: rgba(255,255,255,0.35); margin-bottom: 30px; }
    .ld-track { width: 220px; height: 2px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
    .ld-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.25s ease; border-radius: 2px; }
    .ld-hint { margin-top: 16px; font-size: 10px; letter-spacing: 0.12em; color: rgba(255,255,255,0.2); }

    /* ── Top bar ── */
    #topbar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 20; padding: 22px 28px;
      background: linear-gradient(to bottom, rgba(0,0,0,0.65) 0%, transparent 100%);
      display: flex; align-items: flex-start; justify-content: space-between; pointer-events: none;
    }
    #topbar h1 { font-size: 13px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: rgba(255,255,255,0.92); transition: color 0.3s; }
    #topbar p { font-size: 10px; color: rgba(255,255,255,0.3); margin-top: 4px; letter-spacing: 0.08em; }
    #ctrl-hint { text-align: right; font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.2); line-height: 1.9; }

    /* ── Mode toggle ── */
    #mode-toggle {
      position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 30;
      display: flex; align-items: center; gap: 0;
      background: rgba(0,0,0,0.55); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 30px; padding: 3px; backdrop-filter: blur(14px);
    }
    .toggle-btn {
      font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase;
      padding: 7px 18px; border-radius: 24px; border: none; cursor: pointer;
      transition: all 0.25s; background: none; color: rgba(255,255,255,0.4);
      white-space: nowrap;
    }
    .toggle-btn.active-bar { background: var(--gold); color: #000; }
    .toggle-btn.active-ktv { background: var(--ktv); color: #fff; }
    .toggle-btn.active-dance { background: var(--dance); color: #000; }

    /* ── Ride button ── */
    #ride-btn {
      position: absolute; top: 68px; left: 50%; transform: translateX(-50%); z-index: 30;
      background: rgba(0,0,0,0.6); border: 1px solid rgba(200,169,110,0.45);
      color: var(--gold); font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase;
      padding: 8px 22px; border-radius: 24px; cursor: pointer; transition: all 0.3s;
      white-space: nowrap; backdrop-filter: blur(12px);
    }
    #ride-btn:hover { background: rgba(200,169,110,0.14); border-color: var(--gold); }
    #ride-btn.riding { background: rgba(200,169,110,0.2); border-color: var(--gold); color: #e0c080; }
    #ride-btn.ktv-mode { border-color: rgba(224,64,251,0.45); color: var(--ktv); }
    #ride-btn.ktv-mode:hover { background: rgba(224,64,251,0.14); border-color: var(--ktv); }
    #ride-btn.ktv-mode.riding { background: rgba(224,64,251,0.2); border-color: var(--ktv); color: #f06cff; }
    #ride-btn.dance-mode { border-color: rgba(0,229,255,0.45); color: var(--dance); }
    #ride-btn.dance-mode:hover { background: rgba(0,229,255,0.12); border-color: var(--dance); }
    #ride-btn.dance-mode.riding { background: rgba(0,229,255,0.2); border-color: var(--dance); color: #5ff; }

    /* ── Status ── */
    #status {
      position: absolute; top: 110px; left: 50%; transform: translateX(-50%); z-index: 30;
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(255,255,255,0.3); white-space: nowrap; pointer-events: none;
      transition: opacity 0.4s; opacity: 0;
    }
    #status.visible { opacity: 1; }

    /* ── Info card (shared by bars & KTV) ── */
    #bar-card {
      position: absolute; top: 50%; right: 28px; transform: translateY(-50%) translateX(120%);
      z-index: 30; width: 300px;
      transition: transform 0.55s cubic-bezier(0.22,1,0.36,1), opacity 0.4s;
      opacity: 0; pointer-events: none;
    }
    #bar-card.visible { transform: translateY(-50%) translateX(0); opacity: 1; pointer-events: auto; }
    .bc-wrap { background: var(--dark); backdrop-filter: blur(22px); border: 1px solid rgba(200,169,110,0.22); border-radius: 16px; overflow: hidden; transition: border-color 0.3s; }
    .bc-wrap.ktv { border-color: rgba(224,64,251,0.3); }
    .bc-wrap.dance { border-color: rgba(0,229,255,0.3); }
    .bc-photo { height: 155px; position: relative; overflow: hidden; }
    .bc-photo-bg { position: absolute; inset: 0; background-size: cover; background-position: center; transition: transform 6s ease; }
    #bar-card.visible .bc-photo-bg { transform: scale(1.04); }
    .bc-photo-overlay { position: absolute; inset: 0; background: linear-gradient(to top, rgba(6,6,18,0.95) 0%, rgba(6,6,18,0.1) 70%); }
    .bc-photo-label { position: absolute; bottom: 0; left: 0; right: 0; padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; }
    .bc-stop-tag { font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold); transition: color 0.3s; }
    .bc-stop-tag.ktv { color: var(--ktv); }
    .bc-stop-tag.dance { color: var(--dance); }
    .bc-close-btn { background: none; border: none; color: rgba(255,255,255,0.3); font-size: 20px; cursor: pointer; line-height: 1; transition: color 0.2s; }
    .bc-close-btn:hover { color: rgba(255,255,255,0.8); }
    .bc-body { padding: 14px 16px 18px; }
    .bc-name { font-size: 22px; font-weight: 300; color: rgba(255,255,255,0.95); margin-bottom: 3px; }
    .bc-loc { font-size: 11px; color: rgba(255,255,255,0.28); margin-bottom: 10px; line-height: 1.5; }
    .bc-desc { font-size: 12px; color: rgba(255,255,255,0.5); line-height: 1.65; margin-bottom: 14px; }
    .bc-rule { width: 24px; height: 1px; background: rgba(200,169,110,0.3); margin-bottom: 12px; transition: background 0.3s; }
    .bc-rule.ktv { background: rgba(224,64,251,0.35); }
    .bc-rule.dance { background: rgba(0,229,255,0.35); }
    .bc-must { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(255,255,255,0.2); margin-bottom: 8px; }
    .bc-drinks { list-style: none; }
    .bc-drinks li { font-size: 12px; color: rgba(255,255,255,0.5); padding: 3px 0; display: flex; align-items: center; gap: 8px; }
    .bc-drinks li::before { content: ''; width: 3px; height: 3px; border-radius: 50%; background: var(--gold); flex-shrink: 0; transition: background 0.3s; }
    .bc-drinks.ktv li::before { background: var(--ktv); }
    .bc-drinks.dance li::before { background: var(--dance); }

    /* ── Landmark card ── */
    #lm-card {
      position: absolute; bottom: 80px; left: 28px; z-index: 30; width: 280px;
      transform: translateY(14px); opacity: 0; pointer-events: none;
      transition: transform 0.4s cubic-bezier(0.22,1,0.36,1), opacity 0.35s;
    }
    #lm-card.visible { transform: translateY(0); opacity: 1; pointer-events: auto; }
    .lm-wrap { background: var(--dark); backdrop-filter: blur(22px); border: 1px solid rgba(255,255,255,0.09); border-radius: 14px; overflow: hidden; }
.lm-header { padding: 10px 14px; border-bottom: 1px solid rgba(255,255,255,0.06); display: flex; align-items: center; justify-content: space-between; }
    .lm-icon-name { display: flex; align-items: center; gap: 8px; }
    .lm-icon { font-size: 16px; }
    .lm-name { font-size: 13px; font-weight: 500; color: rgba(255,255,255,0.9); }
    .lm-close { background: none; border: none; color: rgba(255,255,255,0.22); font-size: 18px; cursor: pointer; line-height: 1; transition: color 0.2s; }
    .lm-close:hover { color: rgba(255,255,255,0.7); }
    .lm-desc { padding: 12px 14px; font-size: 12px; color: rgba(255,255,255,0.45); line-height: 1.65; }

    /* ── Bottom strip ── */
    #bottombar {
      position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
      padding: 50px 28px 20px;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 100%);
      pointer-events: none;
    }
    #stop-strip { display: flex; align-items: center; gap: 14px; }
    .strip-item { display: flex; align-items: center; gap: 7px; opacity: 0.22; transition: opacity 0.4s; cursor: pointer; pointer-events: auto; }
    .strip-item:hover { opacity: 0.7; }
    .strip-item.current { opacity: 1; }
    .strip-item.passed { opacity: 0.5; }
    .strip-num { width: 20px; height: 20px; border-radius: 50%; background: var(--gold); color: #000; font-size: 9px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.3s; }
    .strip-num.ktv { background: var(--ktv); color: #fff; }
    .strip-num.dance { background: var(--dance); color: #000; }
    .strip-name { font-size: 11px; color: rgba(255,255,255,0.85); letter-spacing: 0.04em; white-space: nowrap; }
    .strip-connector { width: 28px; height: 1px; background: rgba(255,255,255,0.1); flex-shrink: 0; }

    /* ── Progress ── */
    #progress { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; z-index: 30; background: rgba(255,255,255,0.04); }
    #progress-fill { height: 100%; background: var(--gold); width: 0%; transition: width 0.3s linear, background 0.3s; }
    #progress-fill.ktv { background: var(--ktv); }
    #progress-fill.dance { background: var(--dance); }

    /* ── Cab marker ── */
    .cab-el { display: flex; flex-direction: column; align-items: center; pointer-events: none; }
    .cab-emoji { font-size: 30px; line-height: 1; filter: drop-shadow(0 2px 10px rgba(0,0,0,1)); }
    .cab-beam { width: 2px; height: 12px; margin-top: 2px; background: linear-gradient(to bottom, rgba(200,169,110,0.9), transparent); }

    /* ── Mapbox overrides ── */
    .mapboxgl-ctrl-bottom-left, .mapboxgl-ctrl-bottom-right { display: none; }
    .mapboxgl-ctrl-top-right { top: 22px; right: 28px; }
    .mapboxgl-ctrl-group { background: rgba(6,6,18,0.8) !important; border: 1px solid rgba(255,255,255,0.1) !important; }
    .mapboxgl-ctrl-group button { background-color: transparent !important; }
    .mapboxgl-ctrl-group button span { filter: invert(1) opacity(0.5); }
  </style>
</head>

// ─── ROUTE BUILDER ───────────────────────────────────────────────────────────

function buildRoute(places) {
  const pts = places.map(p => p.coords);
  const result = [];
  const N = 80;
  for (let i = 0; i < pts.length - 1; i++) {
    const p0 = pts[Math.max(i-1,0)], p1 = pts[i], p2 = pts[i+1], p3 = pts[Math.min(i+2,pts.length-1)];
    for (let t = 0; t < N; t++) {
      const s = t/N, s2 = s*s, s3 = s2*s;
      result.push([
        0.5*((2*p1[0])+(-p0[0]+p2[0])*s+(2*p0[0]-5*p1[0]+4*p2[0]-p3[0])*s2+(-p0[0]+3*p1[0]-3*p2[0]+p3[0])*s3),
        0.5*((2*p1[1])+(-p0[1]+p2[1])*s+(2*p0[1]-5*p1[1]+4*p2[1]-p3[1])*s2+(-p0[1]+3*p1[1]-3*p2[1]+p3[1])*s3),
      ]);
    }
  }
  result.push(pts[pts.length-1]);
  return result;
}

const cabEl = document.createElement('div');
cabEl.className = 'cab-el';
cabEl.innerHTML = '<div class="cab-emoji">🚕</div><div class="cab-beam"></div>';
const cabMarker = new mapboxgl.Marker({ element: cabEl, anchor: 'bottom' });

let riding = false, rideRaf = null, rideT0 = null;
const RIDE_DUR = 38000;
const announced = new Set();

document.getElementById('ride-btn').addEventListener('click', () => riding ? stopRide() : startRide());

function startRide() {
  const data = activeData(), route = activeRoute();
  riding = true;
  announced.clear();
  hideBarCard(); hideLmCard();
  const rideBtn = document.getElementById('ride-btn');
  rideBtn.textContent = '✕ Stop Ride';
  rideBtn.classList.add('riding');
  document.querySelectorAll('.strip-item').forEach(el => el.classList.remove('current','passed'));
  cabMarker.setLngLat(route[0]).addTo(map);
  map.getSource('traveled').setData({ type:'Feature', geometry:{ type:'LineString', coordinates:[] } });
  // Trail color matches mode
  const trailColor = currentMode==='ktv' ? '#f06cff' : currentMode==='dance' ? '#00e5ff' : '#f0c060';
  map.setPaintProperty('traveled-line','line-color', trailColor);
  const statusMsg = { bar:'Riding through Jinjiang District…', ktv:'Cruising to the KTV venues…', dance:'Dancing across Chengdu…' };
  setStatus(statusMsg[currentMode]);
  map.flyTo({ center:data[0].coords, zoom:15, pitch:62, bearing:-10, duration:1800, essential:true });
  rideT0 = null;
  rideRaf = requestAnimationFrame(rideFrame);
}

function rideFrame(now) {
  if (!riding) return;
  if (!rideT0) rideT0 = now;
  const route = activeRoute(), data = activeData();
  const t = Math.min((now - rideT0) / RIDE_DUR, 1);
  const total = route.length - 1;
  const frac = t * total;
  const idx = Math.min(Math.floor(frac), total - 1);
  const a = route[idx], b = route[idx+1] || route[idx];
  const blend = frac - idx;
  const pos = [a[0]+(b[0]-a[0])*blend, a[1]+(b[1]-a[1])*blend];

  cabMarker.setLngLat(pos);
  map.getSource('traveled').setData({ type:'Feature', geometry:{ type:'LineString', coordinates: route.slice(0,idx+1).concat([pos]) } });
  document.getElementById('progress-fill').style.width = (t*100).toFixed(2)+'%';

  data.forEach((item, i) => {
    const dx = (pos[0]-item.coords[0])*111320*Math.cos(item.coords[1]*Math.PI/180);
    const dy = (pos[1]-item.coords[1])*110540;
    if (!announced.has(i) && Math.sqrt(dx*dx+dy*dy) < 80) {
      announced.add(i);
      showCard(item, i);
      document.getElementById(`strip-${i}`).classList.add('current');
      data.forEach((_,j) => { if(j<i) document.getElementById(`strip-${j}`).classList.add('passed'); });
      map.easeTo({ center:item.coords, zoom:15.5, pitch:62, bearing:-10, duration:1200, essential:true });
    }
  });

  if (t < 1) rideRaf = requestAnimationFrame(rideFrame);
  else setTimeout(stopRide, 1500);
}

function stopRide() {
  riding = false;
  if (rideRaf) { cancelAnimationFrame(rideRaf); rideRaf = null; }
  cabMarker.remove();
  map.getSource('traveled').setData({ type:'Feature', geometry:{ type:'LineString', coordinates:[] } });
  const rideBtn = document.getElementById('ride-btn');
  rideBtn.textContent = '🚕 Ride the Cab';
  rideBtn.classList.remove('riding');
  document.getElementById('progress-fill').style.width = '0%';
  setStatus('');
  const center = currentMode==='ktv' ? [104.0820,30.6410] : [104.0742,30.6538];
  map.flyTo({ center, zoom:currentMode==='ktv'?13.2:14.5, pitch:55, bearing:-10, duration:2000, essential:true });
}

  document.getElementById('bar-card').classList.add('visible');
  hideLmCard();
}
function hideBarCard() { document.getElementById('bar-card').classList.remove('visible'); }

function showLmCard(lm) {
  document.getElementById('lm-icon').textContent = lm.icon;
  document.getElementById('lm-name').textContent = lm.name;
  document.getElementById('lm-desc').textContent = lm.desc;
  document.getElementById('lm-card').classList.add('visible');
  hideBarCard();
}
function hideLmCard() { document.getElementById('lm-card').classList.remove('visible'); }

document.getElementById('bc-close').addEventListener('click', hideBarCard);
document.getElementById('lm-close').addEventListener('click', hideLmCard);

// ─── LOADER ──────────────────────────────────────────────────────────────────

const hints = ['Loading Chengdu…','Placing the venues…','Lighting the lanterns…','Building 3D scene…','Almost ready…'];
let prog = 0;
const ldFill = document.getElementById('ld-fill');
const ldHint = document.getElementById('ld-hint');
let mapIdle = false, loaderDone = false;

map.once('idle', () => { mapIdle = true; tryDismissLoader(); });

function tryDismissLoader() {
  if (mapIdle && loaderDone) {
    document.getElementById('loader').classList.add('fade-out');
    setTimeout(() => { document.getElementById('loader').style.display='none'; }, 950);
  }
}

function tick() {
  prog += 4 + Math.random()*8;
  if (prog > 95) prog = 95;
  ldFill.style.width = prog+'%';
  ldHint.textContent = hints[Math.min(Math.floor(prog/22), hints.length-1)];
  if (prog < 95) setTimeout(tick, 80+Math.random()*60);
  else {
    const check = setInterval(() => {
      if (mapIdle) { clearInterval(check); prog=100; ldFill.style.width='100%'; loaderDone=true; tryDismissLoader(); }
    }, 200);
  }
}
setTimeout(tick, 200);
</script>
